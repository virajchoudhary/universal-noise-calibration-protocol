dataset:
  name: civilcomments
  max_length: 128
  tokenizer: bert-base-uncased

model:
  name: bert-base-uncased
  num_classes: 2

nsa:
  noise_types: [embedding_gaussian, token_masking, synonym_substitution]
  sigma_range: [0.05, 1.0]
  num_levels: 11
  num_samples: 500

cni:
  calibration_method: threshold
  target_flip_rate: 0.5
  noise_type: auto
  schedule: three_phase

training:
  batch_size: 32
  lr: 2e-5
  epochs: 5
  phase_a_epochs: 1
  phase_b_epochs: 3
  phase_c_epochs: 1
  warmup_ratio: 0.1
  weight_decay: 0.01
  annealing: linear
  mixed_precision: true
  num_workers: 2

evaluation:
  metrics_list: [avg_acc, worst_group_acc, per_group_acc, srd]

wandb:
  project_name: uncp
  entity: null
  enabled: false

seed: 42
device: auto
