dataset:
  name: adult_income
  root: ./data
  correlation_strength: 0.8

model:
  name: mlp
  hidden_dims: [128, 64, 32]
  dropout: 0.2
  num_classes: 2

nsa:
  noise_types: [feature_permutation, continuous_gaussian, category_swap]
  sigma_range: [0.05, 1.0]
  num_levels: 11
  num_samples: 1000

cni:
  calibration_method: threshold
  target_flip_rate: 0.5
  noise_type: auto
  schedule: three_phase

training:
  batch_size: 256
  lr: 0.001
  epochs: 40
  phase_a_epochs: 5
  phase_b_epochs: 25
  phase_c_epochs: 10
  weight_decay: 0.0001
  annealing: cosine

evaluation:
  metrics_list: [avg_acc, worst_group_acc, per_group_acc, srd]

wandb:
  project_name: uncp
  entity: null
  enabled: false

seed: 42
device: auto
