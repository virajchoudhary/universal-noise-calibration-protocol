# Colored MNIST — Phase 1 primary benchmark config
dataset:
  name: colored_mnist
  root: ./data
  correlation_strength: 0.9
  label_noise: 0.25
  download: true

model:
  name: resnet18_small
  hidden_dim: 512
  num_classes: 10

nsa:
  noise_types: [gaussian, spatial_masking, frequency_filter, gaussian_blur, color_jitter, patch_shuffle]
  sigma_range: [0.05, 1.0]
  num_levels: 11
  num_samples: 500

cni:
  calibration_method: threshold   # threshold | mi_inspired | adaptive
  target_flip_rate: 0.5
  noise_type: auto                # auto = take NSA recommendation
  schedule: three_phase

training:
  batch_size: 128
  lr: 0.001
  epochs: 20
  phase_a_epochs: 3
  phase_b_epochs: 12
  phase_c_epochs: 5
  warmup_ratio: 0.15
  weight_decay: 0.0001
  annealing: cosine
  mixed_precision: false
  num_workers: 0

evaluation:
  metrics_list: [avg_acc, worst_group_acc, per_group_acc, srd]

wandb:
  project_name: uncp
  entity: null
  enabled: false

seed: 42
device: auto
